server:
  port: 8081

spring:
  application:
    name: chamoMarket

  datasource:
    url: jdbc:h2:file:./data/chamoMarket
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

    defer-datasource-initialization: true

    properties:
      hibernate:
        format-sql: true

  logging:
    level:
      org.springframework: INFO
      com.myapp: DEBUG

  jwt:
    secret: chamoMarketSecretKey2024XyZ123456789AbCdEfGhIjKlMnOpQrStUvWxYz
    expiration: 240000

